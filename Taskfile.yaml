version: '3'

tasks:
  upgrade:
    desc: Update go dependencies
    cmds:
      - go get -u .

  build:
    desc: Build the binary
    cmd: go build .

  test:
    desc: Run unit tests (excludes e2e)
    cmd: go test $(go list ./... | grep -v '/e2e')

  e2e:
    desc: Run end-to-end tests only
    cmd: go test ./e2e/...

  test:all:
    desc: Run all tests (unit + e2e)
    cmd: go test ./...

  clean:
    desc: Cleanup dependencies
    cmd: go mod tidy